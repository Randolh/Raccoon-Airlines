<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Pago</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <style>
        .card-row {
            display: flex;
            gap: 1rem;
        }

        .card-row .form__group {
            flex: 1;
        }

        @media (max-width: 480px) {
            .card-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="layout page-content">
        <header class="header auth-header">
            <a href="./menu.html" class="header__back">
                <svg class="icon-small">
                    <use href="./assets/icons.svg#arrow"></use>
                </svg>
                Volver al Menú
            </a>
        </header>

        <main class="main-content main-content--centered">
            <div class="auth-container card">
                <div class="card__header">
                    <svg class="logo u-margin-bottom-sm">
                        <use href="./assets/logo.svg#logo"></use>
                    </svg>
                    <h1 class="card__title">Pago Seguro</h1>
                    <p class="card__subtitle">Introduce los datos de tu tarjeta</p>
                </div>

                <form class="form" action="./processing.html">
                    <div class="form__group">
                        <label class="form__label" for="cardName">Nombre en la tarjeta</label>
                        <input class="form__input" type="text" name="cardName" id="cardName"
                            placeholder="Ej. Leon S. Kennedy" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="cardNumber">Número de tarjeta</label>
                        <input class="form__input" type="text" name="cardNumber" id="cardNumber"
                            placeholder="0000 0000 0000 0000" maxlength="19" pattern="[0-9\s]+" required>
                    </div>

                    <div class="card-row">
                        <div class="form__group">
                            <label class="form__label" for="expiryDate">Fecha de exp. (MM/AA)</label>
                            <input class="form__input" type="text" name="expiryDate" id="expiryDate"
                                placeholder="MM/AA" maxlength="5" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" required>
                        </div>
                        <div class="form__group">
                            <label class="form__label" for="cvv">CVV</label>
                            <input class="form__input" type="text" name="cvv" id="cvv"
                                placeholder="123" maxlength="4" pattern="[0-9]{3,4}" required>
                        </div>
                    </div>

                    <button class="btn btn--primary u-margin-top-md" type="submit" style="width: 100%;">Pagar Ahora</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
