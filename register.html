<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Register</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-form-container">
            <header class="header auth-header">
                <a href="./index.html" class="header__back">
                    <svg class="icon-small">
                        <use href="./assets/icons.svg#arrow"></use>
                    </svg>
                    Back to Home
                </a>
            </header>

            <main class="login-main">
                <div class="login-card">
                    <div class="card__header">
                        <svg class="logo u-margin-bottom-sm">
                            <use href="./assets/logo.svg#logo"></use>
                        </svg>
                        <h1 class="card__title">Create Account</h1>
                        <p class="card__subtitle">JOIN RACCOON AIRLINES</p>
                    </div>

                <form class="form" action="./create-password.html">
                    <div class="form__group">
                        <label class="form__label" for="fullname">Full Name</label>
                        <input class="form__input" type="text" name="fullname" id="fullname" placeholder="Leon Kennedy"
                            pattern="[A-Za-zÀ-ÿ\s]+" title="Solo letras y espacios permitidos" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="idnumber">ID Number</label>
                        <input class="form__input" type="text" name="idnumber" id="idnumber" placeholder="1234567890123"
                            maxlength="13" pattern="[0-9]+" title="Introduce solo números" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="email">Email</label>
                        <input class="form__input" type="email" name="email" id="email"
                            placeholder="leon.kennedy@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" title="Introduce un correo válido" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="phone">Phone</label>
                        <input class="form__input" type="tel" name="phone" id="phone" placeholder="+502 12345678"
                            pattern="[\+0-9\s\-]+" title="Introduce un número de teléfono válido" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="country">Country</label>
                        <select class="form__select" name="country" id="country" required>
                            <option value="" disabled selected>Select your city</option>

                            <optgroup label="Norteamérica">
                                <option value="ca">Canadá</option>
                                <option value="us">Estados Unidos</option>
                                <option value="mx">México</option>
                            </optgroup>

                            <optgroup label="Centroamérica">
                                <option value="bz">Belice</option>
                                <option value="cr">Costa Rica</option>
                                <option value="sv">El Salvador</option>
                                <option value="gt">Guatemala</option>
                                <option value="hn">Honduras</option>
                                <option value="ni">Nicaragua</option>
                                <option value="pa">Panamá</option>
                            </optgroup>

                            <optgroup label="Sudamérica">
                                <option value="ar">Argentina</option>
                                <option value="bo">Bolivia</option>
                                <option value="br">Brasil</option>
                                <option value="cl">Chile</option>
                                <option value="co">Colombia</option>
                                <option value="ec">Ecuador</option>
                                <option value="gy">Guyana</option>
                                <option value="py">Paraguay</option>
                                <option value="pe">Perú</option>
                                <option value="uy">Uruguay</option>
                                <option value="ve">Venezuela</option>
                            </optgroup>
                        </select>
                    </div>
                    <input class="btn btn--primary u-margin-top-md" type="submit" value="Create">

                    <div class="card-links u-text-center u-display-column">
                        <a href="./login.html" class="btn--link">Already have an account? Login</a>
                    </div>
                </form>
                </div>
            </main>
        </div>

        <div class="login-showcase">
            <div class="showcase-content glass-panel">
                <h2>Raccoon Airlines</h2>
                <p>Flying to your dreams</p>
                <div class="showcase-features">
                    <span class="feature-tag">Premium Comfort</span>
                    <span class="feature-tag">Global Destinations</span>
                    <span class="feature-tag">Exceptional Service</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
