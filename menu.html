<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Airlines - Menu</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
</head>

<body>
    <div class="layout page-content">
        <header class="header">
            <div class="header__brand">
                <svg class="logo u-margin-bottom-sm">
                    <use href="./assets/logo.svg#logo"></use>
                </svg>
                <span>Resident Airlines</span>
            </div>
            <div class="header__user">
                <span class="u-margin-right-sm">Hello Leon Kennedy!</span>
                <a href="index.html" class="btn--link">Log Out</a>
            </div>
        </header>

        <main class="main-content">
            <h1 class="u-margin-bottom-md u-text-center">How can we help you today?</h1>
            <div class="grid">
                <a href="search-flights.html" class="action-card">
                    <svg class="action-card__icon">
                        <use href="./assets/icons.svg#search"></use>
                    </svg>
                    <span class="action-card__title">Search Flights</span>
                </a>

                <a href="checkin.html" class="action-card">
                    <svg class="action-card__icon">
                        <use href="./assets/icons.svg#check"></use>
                    </svg>
                    <span class="action-card__title">Check-In</span>
                </a>

                <a href="my-flights.html" class="action-card">
                    <svg class="action-card__icon">
                        <use href="./assets/icons.svg#new"></use>
                    </svg>
                    <span class="action-card__title">My Flights</span>
                </a>
            </div>
        </main>
    </div>
</body>

</html>
