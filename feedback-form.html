<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Customer Service</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg">
</head>

<body>
    <div class="layout layout--dashboard page-content">
        <aside class="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__brand">
                    <svg class="header__logo">
                        <use href="./assets/logo.svg#logo"></use>
                    </svg>
                    <span>Raccoon Airlines</span>
                </div>
            </div>

            <div class="sidebar__user">
                <div class="sidebar__avatar">LK</div>
                <div class="sidebar__user-info">
                    <span class="sidebar__name">Leon Kennedy</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a href="menu.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#grid"></use>
                    </svg>
                    Dashboard
                </a>
                <a href="search-flights.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#search"></use>
                    </svg>
                    Search Flights
                </a>
                <a href="checkin.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#check"></use>
                    </svg>
                    Check-In
                </a>
                <a href="my-flights.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#new"></use>
                    </svg>
                    My Flights
                </a>
                <a href="feedback-form.html" class="sidebar__link sidebar__link--active">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#message"></use>
                    </svg>
                    Support
                </a>
            </nav>

            <div class="sidebar__footer">
                <a href="index.html" class="sidebar__link sidebar__link--logout">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#logout"></use>
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <header class="header">
            <div class="header__brand">
                <svg class="logo u-margin-bottom-sm">
                    <use href="./assets/logo.svg#logo"></use>
                </svg>
                <span>Raccoon Airlines</span>
            </div>
        </header>

        <div class="mobile-user-profile">
            <div class="mobile-user-profile__avatar">LK</div>
            <div class="mobile-user-profile__info">
                <span class="mobile-user-profile__name">Leon Kennedy</span>
                <a href="./index.html" class="btn--link mobile-user-profile__logout">Logout</a>
            </div>
            <a href="./menu.html" class="mobile-user-profile__menu">Menú</a>
        </div>

        <main class="main-content main-content--dashboard">
            <div class="dashboard-inner-content">
                <div class="card-check">
                    <div class="card">
                        <div class="card__header">
                            <h1 class="card__title">Customer Service</h1>
                            <p class="card__subtitle">Send us your suggestions or comments</p>
                        </div>

                        <form class="form" action="./menu.html">
                            <div class="form__group">
                                <label class="form__label" for="name">Full Name</label>
                                <input class="form__input" type="text" name="name" id="name"
                                    placeholder="Leon Kennedy" required pattern=".{3,}">
                            </div>

                            <div class="form__group">
                                <label class="form__label" for="email">E-mail</label>
                                <input class="form__input" type="email" name="email" id="email"
                                    placeholder="leon.kennedy@example.com" required>
                            </div>

                            <div class="form__group">
                                <label class="form__label" for="topic">Topic</label>
                                <input class="form__input" type="text" name="topic" id="topic"
                                    placeholder="Flight problem or suggestion" required minlength="5">
                            </div>

                            <div class="form__group">
                                <label class="form__label" for="comment">Comment</label>
                                <textarea class="form__textarea" name="comment" id="comment"
                                    placeholder="Write your message here..." required minlength="25"></textarea>
                            </div>

                            <div class="form__group form__group--full u-margin-top-md">
                                <button class="btn btn--primary btn--animated" type="submit">Send Message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
