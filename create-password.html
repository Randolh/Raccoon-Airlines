<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Airlines - Create Password</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
</head>

<body>
    <div class="loader-screen">
        <div class="loader-screen__content">
            <img class="loader-screen__logo" src="./assets/logo.svg" alt="Umbrella Logo">
            <div class="loader-screen__bar"></div>
        </div>
    </div>
    <div class="layout page-content">
        <header class="header auth-header">
            <a href="./index.html" class="header__back">
                <svg class="icon-small"><use href="./assets/icons.svg#arrow"></use></svg>
                Back to Home
            </a>
        </header>
        <main class="main-content main-content--centered">
            <div class="auth-container card">
                <div class="card__header">
                    <svg class="icon u-margin-bottom-sm">
                        <use href="./assets/icons.svg#key"></use>
                    </svg>
                    <h1 class="card__title">Create Password</h1>
                </div>

                <form class="form" action="./menu.html">
                    <div class="form__group">
                        <label class="form__label" for="password">Password</label>
                        <input class="form__input" type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password">Repeat Password</label>
                        <input class="form__input" type="password" name="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <input class="btn btn--primary u-margin-top-md" type="submit" value="Save">
                </form>
            </div>
        </main>
    </div>
</body>

</html>
