<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Create Password</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg">
</head>

<body>
    <div class="loader-screen">
        <div class="loader-screen__content">
            <img class="loader-screen__logo" src="./assets/logo.svg" alt="Umbrella Logo">
            <div class="loader-screen__bar"></div>
        </div>
    </div>
    <div class="login-wrapper">
        <div class="login-form-container">
            <header class="header auth-header">
                <a href="./index.html" class="header__back">
                    <svg class="icon-small">
                        <use href="./assets/icons.svg#arrow"></use>
                    </svg>
                    Back to Home
                </a>
            </header>

            <main class="login-main">
                <div class="login-card">
                    <div class="card__header">
                        <svg class="logo u-margin-bottom-sm">
                            <use href="./assets/logo.svg#logo"></use>
                        </svg>
                        <h1 class="card__title">Create Password</h1>
                        <p class="card__subtitle">SECURE YOUR ACCOUNT</p>
                    </div>

                <form class="form" action="./menu.html">
                    <div class="form__group">
                        <label class="form__label" for="password">Password</label>
                        <input class="form__input" type="password" name="password" id="password" placeholder="••••••••"
                            pattern=".{8,}" title="La contraseña debe tener al menos 8 caracteres" required>
                    </div>

                    <div class="form__group">
                        <label class="form__label" for="password">Repeat Password</label>
                        <input class="form__input" type="password" name="password" id="password" placeholder="••••••••"
                            pattern=".{8,}" title="La contraseña debe tener al menos 8 caracteres" required>
                    </div>

                    <input class="btn btn--primary u-margin-top-md" type="submit" value="Save">
                </form>
                </div>
            </main>
        </div>

        <div class="login-showcase">
            <div class="showcase-content glass-panel">
                <h2>Raccoon Airlines</h2>
                <p>Flying to your dreams</p>
                <div class="showcase-features">
                    <span class="feature-tag">Premium Comfort</span>
                    <span class="feature-tag">Global Destinations</span>
                    <span class="feature-tag">Exceptional Service</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
