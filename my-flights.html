<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Check-In</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body>
    <div class="loader-screen">
        <div class="loader-screen__content">
            <img class="loader-screen__logo" src="./assets/logo.svg" alt="Umbrella Logo">
            <div class="loader-screen__bar"></div>
        </div>
    </div>
    <div class="layout layout--dashboard page-content">
        <aside class="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__brand">
                    <svg class="header__logo">
                        <use href="./assets/logo.svg#logo"></use>
                    </svg>
                    <span>Raccoon Airlines</span>
                </div>
            </div>

            <div class="sidebar__user">
                <div class="sidebar__avatar">LK</div>
                <div class="sidebar__user-info">
                    <span class="sidebar__name">Leon Kennedy</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a href="menu.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#grid"></use>
                    </svg>
                    Dashboard
                </a>
                <a href="search-flights.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#search"></use>
                    </svg>
                    Search Flights
                </a>
                <a href="checkin.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#check"></use>
                    </svg>
                    Check-In
                </a>
                <a href="my-flights.html" class="sidebar__link sidebar__link--active">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#new"></use>
                    </svg>
                    My Flights
                </a>
            </nav>

            <div class="sidebar__footer">
                <a href="index.html" class="sidebar__link sidebar__link--logout">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#logout"></use>
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <header class="header">
            <div class="header__brand">
                <svg class="logo u-margin-bottom-sm">
                    <use href="./assets/logo.svg#logo"></use>
                </svg>
                <span>Raccoon Airlines</span>
            </div>
        </header>

        <div class="mobile-user-profile">
            <div class="mobile-user-profile__avatar">LK</div>
            <div class="mobile-user-profile__info">
                <span class="mobile-user-profile__name">Leon Kennedy</span>
                <a href="./index.html" class="btn--link mobile-user-profile__logout">Logout</a>
            </div>
        </div>

        <main class="main-content main-content--dashboard main-button">
            <div class="dashboard-inner-content">
                <div class="u-margin-bottom-md u-text-center">
                    <h1 class="card__title">My Flights</h1>
                </div>

                <section class="grid grid_flight">

                    <article class="flight-card">
                        <div class="flight-card__header">
                            <div class="flight-card__route">
                                GUA
                                <svg class="icon flight__icon">
                                    <use href="./assets/icons.svg#arrow"></use>
                                </svg>
                                BOG
                            </div>
                            <div class="flight-card__status">ON TIME
                            </div>
                        </div>
                        <div class="flight-card__body">
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Flight</span>
                                <span class="flight-card__value">VAA025</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Date</span>
                                <span class="flight-card__value">Oct 15, 2026</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Departure</span>
                                <span class="flight-card__value">08:00 AM</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Seat</span>
                                <span class="flight-card__value">12A</span>
                            </div>
                        </div>
                    </article>

                    <article class="flight-card">
                        <div class="flight-card__header">
                            <div class="flight-card__route">
                                GUA
                                <svg class="icon flight__icon">
                                    <use href="./assets/icons.svg#arrow"></use>
                                </svg>
                                ARG
                            </div>
                            <div class="flight-card__status">LANDED</div>
                        </div>
                        <div class="flight-card__body">
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Flight</span>
                                <span class="flight-card__value">VAA920</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Date</span>
                                <span class="flight-card__value">Apr 23, 2026</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Arrival</span>
                                <span class="flight-card__value">11:45 AM</span>
                            </div>
                            <div class="flight-card__detail">
                                <span class="flight-card__label">Seat</span>
                                <span class="flight-card__value">4B</span>
                            </div>
                        </div>
                    </article>
                    <a href="./menu.html" class="btn btn--primary u-margin-top-md back-button">Back</a>
                </section>
            </div>
        </main>
    </div>
</body>

</html>
