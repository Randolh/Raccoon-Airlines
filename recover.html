<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Recover Password</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
</head>

<body>
    <div class="layout page-content">
        <header class="header auth-header">
            <a href="./index.html" class="header__back">
                <svg class="icon-small">
                    <use href="./assets/icons.svg#arrow"></use>
                </svg>
                Back to Home
            </a>
        </header>
        <main class="main-content main-content--centered">
            <div class="auth-container card">
                <div class="card__header">
                    <svg class="icon u-margin-bottom-sm">
                        <use href="./assets/icons.svg#key"></use>
                    </svg>
                    <h1 class="card__title">Recover Password</h1>
                </div>

                <form class="form" action="./create-password.html">
                    <div class="form__group">
                        <label class="form__label" for="email">Email</label>
                        <input class="form__input" type="email" name="email" id="email"
                            placeholder="leon.kennedy@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" required title="Introduce un correo válido">

                        <input class="btn btn--primary u-margin-top-md" type="submit" value="Send">
                    </div>

                    <p class="subtext">Enter your email address and we'll send you instructions to reset your password.
                    </p>

                    <div class="u-text-center">
                        <a href="./login.html" class="btn--link">Back to Login</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
