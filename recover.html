<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Recover Password</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-form-container">
            <header class="header auth-header">
                <a href="./index.html" class="header__back">
                    <svg class="icon-small">
                        <use href="./assets/icons.svg#arrow"></use>
                    </svg>
                    Back to Home
                </a>
            </header>

            <main class="login-main">
                <div class="login-card">
                    <div class="card__header">
                        <svg class="logo u-margin-bottom-sm">
                            <use href="./assets/logo.svg#logo"></use>
                        </svg>
                        <h1 class="card__title">Recover Password</h1>
                        <p class="card__subtitle">RESET YOUR CREDENTIALS</p>
                    </div>

                <form class="form" action="./create-password.html">
                    <div class="form__group">
                        <label class="form__label" for="email">Email</label>
                        <input class="form__input" type="email" name="email" id="email"
                            placeholder="leon.kennedy@example.com" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" required title="Introduce un correo válido">

                        <input class="btn btn--primary u-margin-top-md" type="submit" value="Send">
                    </div>

                    <p class="subtext u-margin-top-md">Enter your email address and we'll send you instructions to reset your password.
                    </p>

                    <div class="card-links u-text-center u-display-column">
                        <a href="./login.html" class="btn--link">Back to Login</a>
                    </div>
                </form>
                </div>
            </main>
        </div>

        <div class="login-showcase">
            <div class="showcase-content glass-panel">
                <h2>Raccoon Airlines</h2>
                <p>Flying to your dreams</p>
                <div class="showcase-features">
                    <span class="feature-tag">Premium Comfort</span>
                    <span class="feature-tag">Global Destinations</span>
                    <span class="feature-tag">Exceptional Service</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
