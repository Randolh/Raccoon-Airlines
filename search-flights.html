<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raccoon Airlines - Search Flights </title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="icon" type="image/svg+xml" href="./img/logo.svg">
</head>

<body>
    <div class="layout layout--dashboard page-content">
        <aside class="sidebar">
            <div class="sidebar__header">
                <div class="sidebar__brand">
                    <svg class="header__logo">
                        <use href="./assets/logo.svg#logo"></use>
                    </svg>
                    <span>Raccoon Airlines</span>
                </div>
            </div>

            <div class="sidebar__user">
                <div class="sidebar__avatar">LK</div>
                <div class="sidebar__user-info">
                    <span class="sidebar__name">Leon Kennedy</span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a href="menu.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#grid"></use>
                    </svg>
                    Dashboard
                </a>
                <a href="search-flights.html" class="sidebar__link sidebar__link--active">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#search"></use>
                    </svg>
                    Search Flights
                </a>
                <a href="checkin.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#check"></use>
                    </svg>
                    Check-In
                </a>
                <a href="my-flights.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#new"></use>
                    </svg>
                    My Flights
                </a>

                <a href="feedback-form.html" class="sidebar__link">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#message"></use>
                    </svg>
                    Support
                </a>
            </nav>

            <div class="sidebar__footer">
                <a href="index.html" class="sidebar__link sidebar__link--logout">
                    <svg class="sidebar__icon">
                        <use href="./assets/icons.svg#logout"></use>
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <header class="header">
            <div class="header__brand">
                <svg class="logo u-margin-bottom-sm">
                    <use href="./assets/logo.svg#logo"></use>
                </svg>
                <span>Raccoon Airlines</span>
            </div>
        </header>

        <div class="mobile-user-profile">
            <div class="mobile-user-profile__avatar">LK</div>
            <div class="mobile-user-profile__info">
                <span class="mobile-user-profile__name">Leon Kennedy</span>
                <a href="./index.html" class="btn--link mobile-user-profile__logout">Logout</a>
            </div>
            <a href="./menu.html" class="mobile-user-profile__menu">Menú</a>
        </div>

        <main class="main-content main-content--dashboard">
            <div class="dashboard-inner-content">
                <div class="card">
                    <div class="card__header">
                        <h1 class="card__title">Find your next destination</h1>
                        <p class="card__subtitle">Book your flight with Raccoon Airlines</p>
                    </div>

                    <form class="form form--search" action="./flights.html">
                        <div class="form__group form__group--full form__group--inline u-margin-bottom-sm">
                            <div class="form__checkbox-container">
                                <input type="checkbox" class="form__checkbox" name="on_way" id="on_way">
                                <label class="form__label" for="on_way">One way</label>
                            </div>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="origin">Origin</label>
                            <input class="form__input" type="text" name="origin" id="origin"
                                placeholder="City or Airport" pattern="[A-Za-zÀ-ÿ0-9\s\-,]+" title="Introduce una ciudad o aeropuerto válido" required>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="destination">Destination</label>
                            <input class="form__input" type="text" name="destination" id="destination"
                                placeholder="City or Airport" pattern="[A-Za-zÀ-ÿ0-9\s\-,]+" title="Introduce una ciudad o aeropuerto válido" required>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="departure">Departure Date</label>
                            <input class="form__input" type="date" name="departure" id="departure" required>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="return">Return Date</label>
                            <input class="form__input" type="date" name="return" id="return">
                        </div>

                        <div class="form__group form__group--full u-margin-top-md">
                            <input class="btn btn--primary" type="submit" value="Search">
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
